{% extends "base.html" %}
{% block title %}Instellingen — Tijdregistratie{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Instellingen</h1>
</div>

<div class="form-card">
  <h2 class="settings-section-title">Weergave</h2>

  <div class="setting-row">
    <div class="setting-info">
      <label class="setting-label" for="darkmode-toggle">Donkere modus</label>
      <p class="setting-desc">Schakel over naar een donker kleurenschema.</p>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="darkmode-toggle" onchange="toggleDark()">
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<script>
  const checkbox = document.getElementById('darkmode-toggle');
  checkbox.checked = document.documentElement.classList.contains('dark');

  function toggleDark() {
    const on = document.documentElement.classList.toggle('dark');
    localStorage.setItem('darkMode', on ? '1' : '0');
    checkbox.checked = on;
  }
</script>
{% endblock %}
